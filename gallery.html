<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing: border-box;

        }
        body{
            background-color: burlywood;
            padding: 20px;
        }
        h1{
            text-align:center;
            margin-bottom:30px;
            color:blue;
        }
        .gallery{
            display:grid;
            grid-template-columns: auto auto auto;
            gap: 20px;
        }
        .gallery-item{
            background: white;
            border-radius: 5px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: transform 0.6s;
            position:relative;
        }
        .gallery-item:hover{
            transform: scale(.95);
        }
        .gallery-item img{
            width:100%;
            height: 200px;
            object-fit: cover;
            display:block;
        }

        .caption {
            position: absolute;
            bottom: 15px; /* Pushes it 15px up from the very bottom edge */
    
            /* The Magic Centering Trick */
            left: 50%;
            transform: translateX(-50%); 
    
            /* Styling to make it look nice over the image */
            color: white;
            background-color: rgba(0, 0, 0, 0.7); /* Semi-transparent black background */
            padding: 5px 15px;
            border-radius: 5px;
            text-align: center;
            width: 80%; /* Optional: Prevents text from touching the absolute edges */
        }
    </style>
</head>
<body>
    <h1> Gallery Page </h1>
    <div class="gallery">
        <div class="gallery">

        <div class="gallery-item">
           <img src="https://picsum.photos/id/1015/400/300" alt="Nature image"/>
           <div class="caption"> Beatuiful Nature</div>
        </div>

        <div class="gallery-item">
           <img src="https://picsum.photos/id/1025/400/300" alt="Pet image"/>
           <div class="caption"> Pet Dog</div>
        </div>

        <div class="gallery-item">
           <img src="https://picsum.photos/id/1035/400/300" alt="Mountain image"/>
           <div class="caption"> Mountain Image</div>
        </div>

        <div class="gallery-item">
           <img src="https://picsum.photos/id/1041/400/300" alt="Beach Image"/>
           <div class="caption"> Beach Nature</div>
        </div>

        <div class="gallery-item">
           <img src="https://picsum.photos/id/1050/400/300" alt="City image"/>
           <div class="caption"> City Lights</div>
        </div>

        <div class="gallery-item">
           <img src="https://picsum.photos/id/1060/400/300" alt="Forest image"/>
           <div class="caption"> Green Forest</div>
        </div>

    </div>

    </div>
</body>
</html>
